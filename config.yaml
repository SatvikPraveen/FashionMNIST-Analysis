# FashionMNIST-Analysis Configuration File

# Model Configuration
model:
  architecture: "resnet" # Options: resnet, vit, efficientnet, minicnn, tinyvgg
  num_classes: 10
  pretrained: true
  device: "auto" # auto, cuda, cpu, mps

# Transfer Learning Configuration
transfer_learning:
  freeze_backbone: false # Freeze pretrained weights during training
  num_frozen_layers: 0
  learning_rate: 1e-4

# Training Configuration
training:
  epochs: 50
  batch_size: 32
  learning_rate: 1e-3
  weight_decay: 1e-4
  optimizer: "adam" # adam, sgd
  scheduler: "cosine" # cosine, step, exponential, none
  early_stopping_patience: 5

# Data Configuration
data:
  dataset: "fashion_mnist"
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  normalize: true
  image_size: 224 # For transfer learning models
  grayscale_to_rgb: true # Convert 1-channel to 3-channel for pretrained models

# Data Augmentation Configuration
augmentation:
  enabled: true
  strategy: "advanced" # basic, advanced, custom

  # Geometric
  rotation: 15              # RandomRotation degrees (±)
  horizontal_flip: true     # RandomHorizontalFlip
  vertical_flip: false      # RandomVerticalFlip (not useful for clothing)
  random_crop: true         # RandomCrop with padding
  random_crop_padding: 4    # Pixels of zero-padding before crop (28+4 → crop back to 28)
  random_affine: true       # Slight translate + scale
  zoom: 0.2                 # Scale range for random_affine (kept for back-compat)

  # Color / intensity (grayscale-safe: saturation & hue kept at 0)
  color_jitter: true
  brightness: 0.3           # ±30% brightness variation
  contrast: 0.3             # ±30% contrast variation

  # Noise & occlusion
  random_erasing: true      # Hide random rectangular patches
  random_erasing_prob: 0.3  # Probability of erasing per image
  gaussian_noise: true      # Additive Gaussian noise
  gaussian_noise_std: 0.04  # Noise std (pixel values in [0,1])

  # Batch-level mixing
  cutmix: true
  cutmix_alpha: 1.0
  mixup: true
  mixup_alpha: 0.2

# Ensemble Configuration
ensemble:
  enabled: false
  method: "voting" # voting, stacking, bagging
  models: ["resnet", "vit", "efficientnet"]
  voting_strategy: "hard" # hard, soft

# Explainability Configuration
explainability:
  grad_cam_enabled: true
  shap_enabled: false # Can be slow
  attention_maps_enabled: true
  layer_for_gradcam: "layer4" # For ResNet

# Monitoring Configuration
monitoring:
  mlflow_tracking: false
  wandb_enabled: false
  log_metrics: true
  log_predictions: true
  drift_detection: false

# API Configuration
api:
  host: "0.0.0.0"
  port: 8000
  reload: true
  workers: 1
  max_model_size: 500 # MB

# Real-world Inference Configuration
inference:
  input_size: 224
  confidence_threshold: 0.5
  return_top_k: 3
  grayscale_to_rgb: true

# Paths Configuration
paths:
  data_dir: "./data"
  raw_data_dir: "./data/raw"
  processed_data_dir: "./data/processed"
  models_dir: "./models"
  checkpoints_dir: "./checkpoints"
  results_dir: "./results"
  logs_dir: "./logs"
  plots_dir: "./figures"

# Logging Configuration
logging:
  level: "INFO" # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "./logs/app.log"
